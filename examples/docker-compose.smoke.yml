services:
  a2a-broker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: a2a-broker-smoke
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      SERVICE_NAME: a2a-broker
      PUBLIC_BASE_URL: http://a2a-broker:8787
      STATE_FILE: /var/lib/a2a-broker/state.json
      WORKER_OFFLINE_AFTER_SEC: 90
      RATE_LIMIT_WINDOW_SEC: 60
      RATE_LIMIT_MAX_REQUESTS: 120
      WORKER_RATE_LIMIT_WINDOW_SEC: 60
      WORKER_RATE_LIMIT_MAX_REQUESTS: 120
      ENFORCE_REQUESTER_IDENTITY: 1
      TRUSTED_PROXY: 0
      STALE_REAPER_ENABLED: 1
      STALE_REAPER_INTERVAL_SEC: 30
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - broker-state:/var/lib/a2a-broker
    networks:
      - a2a-smoke
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  echo-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: a2a-broker-smoke-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      BROKER_URL: http://a2a-broker:8787
      WORKER_ID: echo-worker-1
      WORKER_ROLE: analyst
      WORKER_REQUESTER_KIND: node
      WORKER_HANDLER_BUILTIN: echo
      WORKER_POLL_INTERVAL_MS: 2000
      WORKER_HEARTBEAT_INTERVAL_MS: 15000
      WORKER_HANDLER_TIMEOUT_MS: 30000
      WORKER_CAN_ANALYZE: 1
      WORKER_CAN_BACKFILL: 0
      WORKER_CAN_PATCH_WORKSPACE: 0
      WORKER_CAN_PROMOTE_LIVE: 0
      WORKER_WORKSPACE_IDS: smoke
      WORKER_ENVIRONMENTS: research
    depends_on:
      a2a-broker:
        condition: service_healthy
    networks:
      - a2a-smoke

volumes:
  broker-state:

networks:
  a2a-smoke:
    driver: bridge
